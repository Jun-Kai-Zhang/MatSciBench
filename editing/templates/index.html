<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Q&A Editor</title>
  <!-- MathJax configuration to support $...$ and $$...$$ -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$','$$'], ['\\[','\\]']]
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
    }
    #sidebar { 
      position: fixed; 
      width: 200px; 
      top: 0; 
      bottom: 0; 
      background-color: #f0f0f0; 
      overflow-y: auto; 
      padding: 10px; 
    }
    #content { 
      margin-left: 220px; 
      padding: 20px; 
    }
    .qid-item { 
      cursor: pointer; 
      padding: 5px; 
      border-bottom: 1px solid #ccc; 
    }
    .qid-item:hover, .qid-item.active { 
      background-color: #ddd; 
    }
    textarea.source-text { 
      width: 100%; 
      height: 200px; /* larger window for source text */
    }
    .preview { 
      border: 1px solid #ccc; 
      padding: 10px; 
      margin-bottom: 20px; 
      min-height: 50px;
    }
    #attachedImage { 
      max-width: 100%; 
      display: none; 
    }
      .auto-close-message {
  position: fixed; /* Position relative to the viewport */
  top: 20px; /* Position from the top */
  left: 50%; /* Start at horizontal center */
  transform: translateX(-50%); /* Truly center horizontally */
  background-color: #4CAF50; /* Green background - success */
  color: white; /* White text */
  padding: 15px 25px; /* Padding */
  border-radius: 5px; /* Rounded corners */
  z-index: 1050; /* Ensure it's above most other content */
  opacity: 0; /* Start hidden (transparent) */
  visibility: hidden; /* Start hidden (not interactable) */
  transition: opacity 0.3s ease, visibility 0s linear 0.3s; /* Smooth fade out */
  /* The visibility transition ensures it disappears instantly after fading */
  font-family: sans-serif; /* Example font */
  box-shadow: 0 2px 5px rgba(0,0,0,0.2); /* Optional shadow */
}

.auto-close-message.show {
  opacity: 1; /* Make visible */
  visibility: visible; /* Make interactable */
  transition: opacity 0.3s ease; /* Smooth fade in */
}

/* Optional: Style for error messages */
.auto-close-message.error {
  background-color: #f44336; /* Red background */
}
  </style>
</head>
<body>
  <div id="sidebar">
    <h3>Questions</h3>
    <button id="addNewBtn" style="width: 100%; margin-bottom: 10px; background-color: #4CAF50; color: white;">Add New Question</button>
    <div id="statsContainer" style="margin-bottom: 10px; padding: 8px; background-color: #eaeaea; border-radius: 4px;">
      <div><strong>Total Questions:</strong> <span id="totalQuestions">0</span></div>
      <div><strong>With Solutions:</strong> <span id="withSolutions">0</span></div>
      <div><strong>With Images:</strong> <span id="withImages">0</span></div>
    </div>
    
    <!-- Add type filter -->
    <div style="margin-bottom: 10px; padding: 8px; background-color: #eaeaea; border-radius: 4px;">
      <label for="typeFilter"><strong>Filter by Type:</strong></label>
      <select id="typeFilter" style="width: 100%; margin-top: 5px; padding: 3px;">
        <option value="ALL">All Types</option>
        <option value="NUM">NUM</option>
        <option value="FORMULA">FORMULA</option>
        <option value="MCQ">MCQ</option>
      </select>
    </div>
    
    <!-- Add number_of_answers filter -->
    <div style="margin-bottom: 10px; padding: 8px; background-color: #eaeaea; border-radius: 4px;">
      <label for="answerCountFilter"><strong>Filter by Answer Count:</strong></label>
      <select id="answerCountFilter" style="width: 100%; margin-top: 5px; padding: 3px;">
        <option value="ALL">All</option>
        <option value="single">Single</option>
        <option value="multiple">Multiple</option>
      </select>
    </div>
    
    <div id="qidList"></div>
  </div>
  <div id="content">
    <h2 id="questionTitle">Question ID</h2>

    <div>
      <h3>Question Source</h3>
      <textarea id="questionSource" class="source-text"></textarea>
      <h3>Question Preview</h3>
      <div id="questionPreview" class="preview"></div>
    </div>

    <div>
      <h3>Solution Source</h3>
      <textarea id="solutionSource" class="source-text"></textarea>
      <h3>Solution Preview</h3>
      <div id="solutionPreview" class="preview"></div>
    </div>

    <div>
      <h3>Answer Source</h3>
      <textarea id="answerSource" class="source-text" style="height: 30px;"></textarea>
      <h3>Answer Preview</h3>
      <div id="answerPreview" class="preview"></div>
    </div>

    <div>
      <h3>Unit</h3>
      <input type="text" id="unit" placeholder="Enter unit (e.g., kg, m/s, N)" style="padding: 5px; width: 250px;">
      <h3>Unit Preview</h3>
      <div id="unitPreview" class="preview" style="height: 30px;"></div>
    </div>
    <br>

    <div>
      <h3>Categories</h3>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
        <div>
          <label>Materials</label>
          <textarea id="Materials" class="source-text" style="height: 25px; min-height: 25px; resize: none;"></textarea>
        </div>
        <div>
          <label>Properties</label>
          <textarea id="Properties" class="source-text" style="height: 25px; min-height: 25px; resize: none;"></textarea>
        </div>
        <div>
          <label>Structures</label>
          <textarea id="Structures" class="source-text" style="height: 25px; min-height: 25px; resize: none;"></textarea>
        </div>
        <div>
          <label>Fundamental Mechanisms</label>
          <textarea id="Fundamental_Mechanisms" class="source-text" style="height: 25px; min-height: 25px; resize: none;"></textarea>
        </div>
        <div>
          <label>Processes</label>
          <textarea id="Processes" class="source-text" style="height: 25px; min-height: 25px; resize: none;"></textarea>
        </div>
        <div>
          <label>Failure Mechanisms</label>
          <textarea id="Failure_Mechanisms" class="source-text" style="height: 25px; min-height: 25px; resize: none;"></textarea>
        </div>
      </div>
    </div>
    <br>

    <div>
      <h3>Type</h3>
      <select id="questionType" style="padding: 5px; width: 250px;">
        <option value="NUM">NUM</option>
        <option value="FORMULA">FORMULA</option>
        <option value="MCQ">MCQ</option>
      </select>
    </div>
    <br>

    <div>
      <h3>Number of Answers</h3>
      <select id="numberOfAnswers" style="padding: 5px; width: 250px;">
        <option value="single">Single</option>
        <option value="multiple">Multiple</option>
      </select>
    </div>
    <br>
  <div id="autoCloseMessage" class="auto-close-message"></div>

    <button id="saveBtn">Save & Recompile</button>
    <br><br>
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>
    <button id="deleteBtn" style="margin-left: 20px; background-color: #ff5555; color: white;">Delete Question</button>
    <br><br>
    <h3>Images</h3>
    <div id="imagesContainer"></div>
    <h3>Upload New Image</h3>
    <input type="file" id="imgInput" accept="image/*">
    <br><br>
    <div>
      <h3>Notes</h3>
      <textarea id="notesSource" class="source-text" style="height: 100px;"></textarea>
      <h3>Notes Preview</h3>
      <div id="notesPreview" class="preview"></div>
    </div>
  </div>

  <script>
    let currentQID = null;
    let qidList = [];
    let allQuestions = []; // New variable to store all question data

    // Load the list of question IDs from the backend.
    function loadQuestionList() {
      fetch('/questions')
        .then(response => response.json())
        .then(data => {
          qidList = data;
          
          // Fetch complete data for all questions to enable filtering
          fetchAllQuestionData(qidList);
        });
    }

    // Fetch data for all questions to enable filtering
    function fetchAllQuestionData(idList) {
      const fetchPromises = idList.map(qid => 
        fetch('/question/' + encodeURIComponent(qid))
          .then(response => response.json())
      );
      
      Promise.all(fetchPromises)
        .then(questions => {
          allQuestions = questions;
          applyTypeFilter(); // Apply filter after loading all questions
          updateStats();
        })
        .catch(err => {
          console.error('Error fetching all question data', err);
        });
    }

    // Function to apply the type filter
    function applyTypeFilter() {
      const typeFilterValue = document.getElementById('typeFilter').value;
      const answerCountFilterValue = document.getElementById('answerCountFilter').value;
      let filteredQuestions = allQuestions;
      
      // Apply type filter if a specific type is selected
      if (typeFilterValue !== 'ALL') {
        filteredQuestions = filteredQuestions.filter(q => q.type === typeFilterValue);
      }
      
      // Apply answer count filter if a specific value is selected
      if (answerCountFilterValue !== 'ALL') {
        filteredQuestions = filteredQuestions.filter(q => q.number_of_answers === answerCountFilterValue);
      }
      
      // Get the IDs of the filtered questions
      const filteredIds = filteredQuestions.map(q => q.qid);
      
      // Update the sidebar list with filtered questions
      let listDiv = document.getElementById('qidList');
      listDiv.innerHTML = '';
      
      if (filteredIds.length === 0) {
        const noResults = document.createElement('div');
        noResults.style.padding = '10px';
        noResults.style.fontStyle = 'italic';
        noResults.textContent = 'No questions match the current filters';
        listDiv.appendChild(noResults);
      } else {
        filteredIds.forEach(qid => {
          let div = document.createElement('div');
          div.className = 'qid-item';
          div.textContent = qid;
          div.onclick = () => {
            loadQuestion(qid);
          };
          if (qid === currentQID) {
            div.classList.add('active');
          }
          listDiv.appendChild(div);
        });
      }
    }

    // Add event listener for the type filter
    document.getElementById('typeFilter').addEventListener('change', applyTypeFilter);
    
    // Add event listener for the answer count filter
    document.getElementById('answerCountFilter').addEventListener('change', applyTypeFilter);

    // Load a question from the backend and populate the textareas and preview areas.
    function loadQuestion(qid) {
      currentQID = qid;
      // Highlight the active question in the sidebar.
      document.querySelectorAll('.qid-item').forEach(item => {
        if (item.textContent === qid) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
      fetch('/question/' + encodeURIComponent(qid))
        .then(response => response.json())
        .then(data => {
          document.getElementById('questionTitle').textContent = data.qid;
          document.getElementById('questionSource').value = data.question;
          document.getElementById('solutionSource').value = data.solution;
          document.getElementById('answerSource').value = data.answer;
          document.getElementById('notesSource').value = data.notes || '';
          
          // Set the type if it exists
          if (data.type) {
            document.getElementById('questionType').value = data.type;
          } else {
            document.getElementById('questionType').value = 'NUM'; // Default value
          }
          
          // Set the number of answers if it exists
          if (data.number_of_answers) {
            document.getElementById('numberOfAnswers').value = data.number_of_answers;
          } else {
            document.getElementById('numberOfAnswers').value = 'single'; // Default value
          }
          
          // Set the unit if it exists
          if (data.unit) {
            document.getElementById('unit').value = data.unit;
          } else {
            document.getElementById('unit').value = ''; // Default empty
          }

          // Set the category values
          ['Materials', 'Properties', 'Structures', 'Fundamental_Mechanisms', 'Processes', 'Failure_Mechanisms'].forEach(category => {
            document.getElementById(category).value = data[category] || '';
          });
          
          // Update preview areas.
          document.getElementById('questionPreview').innerHTML = data.question;
          document.getElementById('solutionPreview').innerHTML = data.solution;
          document.getElementById('answerPreview').innerHTML = data.answer;
          document.getElementById('unitPreview').innerHTML = data.unit || '';
          document.getElementById('notesPreview').innerHTML = data.notes || '';
          
          // Handle multiple image rendering:
          const imagesContainer = document.getElementById('imagesContainer');
          imagesContainer.innerHTML = ''; // Clear existing images
          
          if (data.image && data.image.trim() !== '') {
            const imagePaths = data.image.trim().split(',');
            
            imagePaths.forEach(path => {
              let imageURL = path.trim();
              if (!imageURL.startsWith('http') && !imageURL.startsWith('/')) {
                imageURL = '/' + imageURL;
              }
              
              // Create image container div
              const imageContainer = document.createElement('div');
              imageContainer.className = 'image-container';
              imageContainer.style.marginBottom = '20px';
              
              // Create and configure image element
              const img = document.createElement('img');
              img.src = imageURL;
              img.alt = 'Question Image';
              img.style.maxWidth = '100%';
              img.style.display = 'block';
              img.style.marginBottom = '5px';
              
              // Create image path display
              const pathDisplay = document.createElement('div');
              pathDisplay.style.fontSize = '12px';
              pathDisplay.style.color = '#666';
              pathDisplay.textContent = "Image path: " + imageURL;
              
              // Create remove button
              const removeBtn = document.createElement('button');
              removeBtn.textContent = 'Remove Image';
              removeBtn.onclick = () => removeImage(path);
              
              // Add elements to container
              imageContainer.appendChild(img);
              imageContainer.appendChild(pathDisplay);
              imageContainer.appendChild(removeBtn);
              
              // Add container to images container
              imagesContainer.appendChild(imageContainer);
            });
          }
          
          // Render LaTeX in the preview areas.
          MathJax.typesetPromise();
        });
    }

    // Function to remove an image
    function removeImage(imagePath) {
      if (confirm('Are you sure you want to remove this image?')) {
        fetch('/question/' + encodeURIComponent(currentQID) + '/image', {
          method: 'DELETE',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ image_path: imagePath })
        })
        .then(response => response.json())
        .then(data => {
          if (data.status === "ok") {
            // Reload question to refresh the images
            loadQuestion(currentQID);
          } else {
            alert('Error removing image: ' + data.error);
          }
        })
        .catch(err => {
          console.error('Error removing image', err);
          alert('Error removing image');
        });
      }
    }
  function showNotification(message, duration = 1000) {
    const notification = document.getElementById('notification');
    notification.textContent = message;
    notification.style.display = 'block';
    notification.style.opacity = '1';
    
    setTimeout(() => {
      notification.style.opacity = '0';
      setTimeout(() => {
        notification.style.display = 'none';
      }, 500);
    }, duration);
  }
    // Save changes to question, solution, and answer to the CSV and update the previews.
    document.getElementById('saveBtn').onclick = function() {
      let payload = {
        question: document.getElementById('questionSource').value,
        solution: document.getElementById('solutionSource').value,
        answer: document.getElementById('answerSource').value,
        type: document.getElementById('questionType').value,
        number_of_answers: document.getElementById('numberOfAnswers').value,
        unit: document.getElementById('unit').value,
        notes: document.getElementById('notesSource').value
      };

      // Add category values to payload
      ['Materials', 'Properties', 'Structures', 'Fundamental_Mechanisms', 'Processes', 'Failure_Mechanisms'].forEach(category => {
        payload[category] = document.getElementById(category).value;
      });

      function showAutoCloseMessage(message, isError = false, duration = 1000) { // Default duration 500ms
          const messageElement = document.getElementById('autoCloseMessage');
          if (!messageElement) {
              console.error("Element with ID 'autoCloseMessage' not found.");
              // Fallback to alert if the element doesn't exist
              alert(message);
              return;
          }
          messageElement.textContent = message; // Set the text content
          messageElement.classList.remove('error'); // Remove error class if present
          if (isError) {
              messageElement.classList.add('error'); // Add error class if needed
          }
          messageElement.classList.add('show'); // Make it visible (triggers CSS transition)
          setTimeout(() => {
              messageElement.classList.remove('show'); // Hide it (triggers CSS transition)
          }, duration);
      }
      fetch('/question/' + encodeURIComponent(currentQID), {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => {
        if(data.status === "ok") {
          // Update preview areas with the saved content.
          document.getElementById('questionPreview').innerHTML = payload.question;
          document.getElementById('solutionPreview').innerHTML = payload.solution;
          document.getElementById('answerPreview').innerHTML = payload.answer;
          document.getElementById('unitPreview').innerHTML = payload.unit;
          document.getElementById('notesPreview').innerHTML = payload.notes;
          MathJax.typesetPromise();
          updateStats();
          showAutoCloseMessage('Changes saved and recompiled!', false, 1000); // false = not an error, 500ms duration
        } else {
          showAutoCloseMessage('Error: ' + data.error, true, 3000); // true = is an error, show for 3 seconds
        }
      })
      .catch(err => {
        console.error('Error saving changes', err);
        alert('Error saving changes.');
      });
    };

    // Navigation: Previous and Next buttons.
    document.getElementById('prevBtn').onclick = function() {
      let index = qidList.indexOf(currentQID);
      if (index > 0) {
        loadQuestion(qidList[index - 1]);
      }
    };

    document.getElementById('nextBtn').onclick = function() {
      let index = qidList.indexOf(currentQID);
      if (index < qidList.length - 1) {
        loadQuestion(qidList[index + 1]);
      }
    };

    // Image upload handling - modified to support multiple images
    document.getElementById('imgInput').addEventListener('change', function() {
      let file = this.files[0];
      if (!file) return;
      let formData = new FormData();
      formData.append('file', file);
      fetch('/question/' + encodeURIComponent(currentQID) + '/image', {
        method: 'POST',
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === "ok") {
          // Reload the question to show updated images
          loadQuestion(currentQID);
          this.value = ''; // Clear the file input for next upload
        } else {
          alert('Image upload failed: ' + data.error);
        }
      })
      .catch(err => {
        console.error('Error uploading image', err);
        alert('Error uploading image');
      });
    });

    // Delete question handler
    document.getElementById('deleteBtn').onclick = function() {
      if (!currentQID) return;
      
      if (confirm('Are you sure you want to delete this question? This action cannot be undone.')) {
        fetch('/question/' + encodeURIComponent(currentQID), {
          method: 'DELETE'
        })
        .then(response => response.json())
        .then(data => {
          if (data.status === "ok") {
            // Refresh the question list
            loadQuestionList();
            
            // Get the index of the deleted question
            let index = qidList.indexOf(currentQID);
            
            // Move to the next question if available, previous if not, or clear if it was the only one
            if (qidList.length > 1) {
              setTimeout(() => {
                // Use a timeout to ensure the qidList is refreshed
                if (index < qidList.length - 1) {
                  loadQuestion(qidList[index + 1]);
                } else if (index > 0) {
                  loadQuestion(qidList[index - 1]);
                } else {
                  loadQuestion(qidList[0]);
                }
              }, 300);
            } else {
              // Clear fields if no questions remain
              document.getElementById('questionTitle').textContent = "No Questions";
              document.getElementById('questionSource').value = "";
              document.getElementById('solutionSource').value = "";
              document.getElementById('answerSource').value = "";
              document.getElementById('questionPreview').innerHTML = "";
              document.getElementById('solutionPreview').innerHTML = "";
              document.getElementById('answerPreview').innerHTML = "";
              document.getElementById('imagesContainer').innerHTML = "";
              document.getElementById('unit').value = "";
              document.getElementById('notesSource').value = "";
              document.getElementById('notesPreview').innerHTML = "";
              document.getElementById('questionType').value = "NUM";
              document.getElementById('numberOfAnswers').value = "single";
              // Clear all category fields
              ['Materials', 'Properties', 'Structures', 'Fundamental_Mechanisms', 'Processes', 'Failure_Mechanisms'].forEach(category => {
                document.getElementById(category).value = '';
              });
              currentQID = null;
            }
            
            updateStats();
            alert('Question deleted successfully.');
          } else {
            alert('Error deleting question: ' + data.error);
          }
        })
        .catch(err => {
          console.error('Error deleting question', err);
          alert('Error deleting question.');
        });
      }
    };

    // Add new question handler
    document.getElementById('addNewBtn').onclick = function() {
      const customQID = prompt('Enter a question ID (leave blank for auto-generated ID):');
      
      // If user cancels the prompt
      if (customQID === null) return;
      
      const requestData = {};
      if (customQID.trim() !== '') {
        requestData.qid = customQID.trim();
      }
      
      fetch('/questions', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(requestData)
      })
      .then(response => {
        if (!response.ok) {
          return response.json().then(data => {
            throw new Error(data.error || 'Error creating question');
          });
        }
        return response.json();
      })
      .then(data => {
        if (data.status === "ok") {
          // Refresh the question list
          loadQuestionList();
          
          // Load the newly created question after a short delay to ensure the list is refreshed
          setTimeout(() => {
            loadQuestion(data.qid);
            updateStats();
          }, 300);
          
          alert('New question created with ID: ' + data.qid);
        } else {
          alert('Error creating new question: ' + data.error);
        }
      })
      .catch(err => {
        console.error('Error creating new question', err);
        alert(err.message || 'Error creating new question.');
      });
    };

    // Update the statistics in the sidebar
    function updateStats() {
      // Use the already fetched allQuestions data
      const totalQuestions = allQuestions.length;
      const withSolutions = allQuestions.filter(q => q.solution && q.solution.trim() !== '').length;
      const withImages = allQuestions.filter(q => q.image && q.image.trim() !== '').length;
      
      document.getElementById('totalQuestions').textContent = totalQuestions;
      document.getElementById('withSolutions').textContent = withSolutions;
      document.getElementById('withImages').textContent = withImages;
    }

    // Initialize the page.
    loadQuestionList();
    setTimeout(() => {
      if (qidList.length > 0) {
        loadQuestion(qidList[0]);
      }
    }, 500);
  </script>
</body>
</html>
